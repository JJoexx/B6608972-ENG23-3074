apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: jenkins
        # ⚠️ ต้องใช้ Image ของ Jenkins จริงๆ ครับ ห้ามใช้ my-nginx-web
        image: jenkins/jenkins:lts
        imagePullPolicy: IfNotPresent # หรือ Always ถ้าคุณก๊อปใส่ Registry แล้ว
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: jenkins-storage
          mountPath: /var/jenkins_home
      volumes:
      - name: jenkins-storage
        persistentVolumeClaim:
          claimName: jenkins-pvc