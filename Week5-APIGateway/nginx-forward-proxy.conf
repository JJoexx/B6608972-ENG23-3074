server {
    # 1. กำหนด Port ที่ต้องการให้เครื่องอื่นในวงแลนชี้มา (ปกติใช้ 8080 หรือ 8888)
    listen 8080;

    # 2. ตั้งค่า DNS Resolver (สำคัญมาก!)
    # Nginx ต้องรู้ว่าจะไปถาม IP ของเว็บปลายทางจากที่ไหน (ในตัวอย่างคือ Google DNS)
    resolver 8.8.8.8;

    location / {
        # 3. ส่งคำขอต่อไปยัง URL ที่ผู้ใช้เรียกมาโดยตรง
        # $scheme คือ http, $http_host คือโดเมน, $request_uri คือ path
        proxy_pass $scheme://$http_host$request_uri;

        # 4. ตั้งค่าการส่งต่อ Header
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ปิดการเก็บ Log ของ Proxy (เลือกเปิดได้ถ้าต้องการตรวจสอบการใช้งาน)
        access_log /var/log/nginx/forward_proxy_access.log;
    }
}
