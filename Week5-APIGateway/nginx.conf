# ส่วนกำหนดการทำงานของ Process
worker_processes auto; # ปรับจำนวนคนทำงานตาม CPU Core

events {
    worker_connections 1024; # รองรับการเชื่อมต่อพร้อมกันต่อ 1 Worker
}

http {
    # 1. การทำ Load Balancing (กลุ่มเซิร์ฟเวอร์หลังบ้าน)
    upstream backend_servers {
        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
    }

    server {
        listen 80;
        server_name example.com;

        # 2. การทำ Web Server (ส่งไฟล์ Static เช่น HTML, รูปภาพ)
        location / {
            root /var/www/html;
            index index.html;
        }

        # 3. การทำ Reverse Proxy & Load Balancer
        # ส่งคำขอที่ขึ้นต้นด้วย /api ไปยังกลุ่ม backend_servers
        location /api/ {
            proxy_pass http://backend_servers;
            
            # ส่ง Header สำคัญไปให้ Backend รู้ตัวตนคนเข้าจริง
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. การจัดการ Error Page
        error_page 404 /404.html;
        location = /404.html {
            root /var/www/html;
        }
    }
}
