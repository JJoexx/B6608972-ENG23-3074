server {
    listen 80;
    server_name myapp.com; # เปลี่ยนเป็นโดเมนหรือ IP ของคุณ

    # บล็อกสำหรับการส่งต่อคำขอ (Reverse Proxy)
    location / {
        # 1. ระบุที่อยู่ของ Backend Service
        proxy_pass http://127.0.0.1:3000; 

        # 2. ตั้งค่า Header เพื่อส่งข้อมูลผู้ใช้จริงไปให้ Backend
        proxy_set_header Host $host;                          # ส่งชื่อโดเมนเดิมไป
        proxy_set_header X-Real-IP $remote_addr;             # ส่ง IP จริงของผู้ใช้ไป
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # ส่งเส้นทาง IP ทั้งหมด
        proxy_set_header X-Forwarded-Proto $scheme;          # บอกว่าใช้ http หรือ https

        # 3. ตั้งค่า Timeout (กรณี Backend ประมวลผลนาน)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
